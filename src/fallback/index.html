<!-- src/fallback/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HAR Download</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; background: #f4f7f9; color: #333;
            padding: 24px;
        }
        .card {
            background: #fff; border-radius: 12px; padding: 24px 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 700px; width: 100%; margin: 0 auto;
        }
        h2 { font-size: 18px; margin-bottom: 4px; color: #4A90E2; text-align: center; }
        .subtitle { font-size: 13px; color: #999; margin-bottom: 16px; text-align: center; }

        /* --- Summary --- */
        .summary { text-align: center; margin-bottom: 16px; }
        .summary strong { font-size: 22px; color: #4A90E2; }

        /* --- Request List --- */
        .request-list-container {
            max-height: 300px;
            overflow: hidden;
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            background: #fff;
            margin-bottom: 16px;
        }
        #request-list {
            max-height: 270px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .request-item {
            display: flex; align-items: center;
            padding: 6px 12px; gap: 8px;
            font-size: 12px; border-bottom: 1px solid #e0e6ed;
        }
        .request-item:last-child { border-bottom: none; }
        .request-method {
            font-weight: 600; font-family: monospace;
            min-width: 48px; padding: 2px 4px;
            border-radius: 3px; text-align: center;
        }
        .method-get { background: #e8f5e9; color: #2e7d32; }
        .method-post { background: #e3f2fd; color: #1565c0; }
        .method-put { background: #fff3e0; color: #ef6c00; }
        .method-delete { background: #ffebee; color: #c62828; }
        .method-patch { background: #f3e5f5; color: #7b1fa2; }
        .method-other { background: #f5f5f5; color: #616161; }
        .request-url {
            flex: 1; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .request-status { font-weight: 600; min-width: 32px; text-align: right; }
        .status-2xx { color: #27ae60; }
        .status-3xx { color: #4A90E2; }
        .status-4xx { color: #f57c00; }
        .status-5xx { color: #e74c3c; }
        .status-other { color: #999; }
        .load-more {
            padding: 8px; text-align: center;
            border-top: 1px solid #e0e6ed;
        }
        .load-more button {
            padding: 4px 16px; border: 1px solid #e0e6ed;
            border-radius: 4px; background: #fff; color: #4A90E2;
            font-size: 12px; cursor: pointer;
        }
        .load-more button:hover { background: #f4f7f9; }

        /* --- Options --- */
        .options { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; }
        .checkbox-option {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; cursor: pointer;
        }
        .checkbox-option input { margin: 0; cursor: pointer; }

        /* --- Actions --- */
        .actions { display: flex; gap: 12px; justify-content: center; margin-bottom: 16px; }
        .actions button {
            padding: 10px 24px; border: none; border-radius: 8px;
            background: #4A90E2; color: #fff; font-size: 14px;
            font-weight: 600; cursor: pointer;
        }
        .actions button:hover:not(:disabled) { background: #7ab3f0; }
        .actions button:disabled { background: #b0c4de; cursor: not-allowed; opacity: 0.7; }
        .actions button.danger { background: #e74c3c; }
        .actions button.danger:hover:not(:disabled) { background: #f07060; }

        /* --- Download Progress --- */
        .spinner {
            width: 32px; height: 32px; border: 3px solid #e0e6ed;
            border-top-color: #4A90E2; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar {
            width: 100%; height: 6px; background: #e0e6ed; border-radius: 3px;
            margin: 16px 0 8px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #4A90E2; border-radius: 3px;
            transition: width 0.3s ease; width: 0%;
        }
        .progress-text { font-size: 12px; color: #777; margin-bottom: 16px; text-align: center; }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 12px; margin: 4px 0; border-radius: 6px;
            background: #f8f9fa; font-size: 13px; font-family: monospace;
        }
        .file-item .status {
            font-family: sans-serif; font-size: 12px; padding: 2px 8px;
            border-radius: 4px; font-weight: 500;
        }
        .status.pending { background: #e0e6ed; color: #666; }
        .status.preparing { background: #fff3cd; color: #856404; }
        .status.downloading { background: #cce5ff; color: #004085; }
        .status.done { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .error { color: #e74c3c; text-align: center; }
        .success { color: #27ae60; text-align: center; }
        .stats { font-size: 12px; color: #999; margin-top: 12px; text-align: center; }

        /* --- Sections visibility --- */
        .section-download { display: none; }
        .section-download.active { display: block; }
        .section-manager { display: block; }
        .section-manager.hidden { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title"></h2>
        <p class="subtitle" id="subtitle"></p>

        <!-- Manager Section -->
        <div class="section-manager" id="manager-section">
            <p class="summary"><span id="captured-label"></span> <strong id="request-count">0</strong></p>

            <div class="request-list-container">
                <div id="request-list"></div>
                <div class="load-more" id="load-more" style="display:none;">
                    <button id="load-more-btn"></button>
                </div>
            </div>

            <div class="options">
                <label class="checkbox-option">
                    <input id="split-files-input" type="checkbox"/>
                    <span id="split-label"></span>
                </label>
            </div>

            <div class="actions">
                <button id="save-har-button"></button>
                <button id="clear-data-button" class="danger"></button>
            </div>
        </div>

        <!-- Download Section -->
        <div class="section-download" id="download-section">
            <div class="spinner" id="spinner"></div>
            <div class="progress-bar" id="progress-bar" style="display:none;">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text"></p>
            <div class="file-list" id="file-list"></div>
            <p id="message"></p>
            <p class="stats" id="stats"></p>
        </div>
    </div>
    <script src="main.ts" type="module"></script>
</body>
</html>
