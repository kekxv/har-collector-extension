<!-- src/fallback/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Fallback Page</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #f4f7f9; color: #333;
        }
        .card {
            background: #fff; border-radius: 12px; padding: 32px 40px;
            text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 400px;
        }
        h2 { font-size: 18px; margin-bottom: 12px; color: #4A90E2; }
        p { font-size: 14px; color: #777; line-height: 1.5; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid #e0e6ed;
            border-top-color: #4A90E2; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="title"></h2>
        <div class="spinner" id="spinner"></div>
        <p id="message"></p>
    </div>
    <script src="main.ts" type="module"></script>
</body>
</html>
