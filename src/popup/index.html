<!-- src/popup/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>HarCollector Control</title>
    <link href="./style.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 id="app-title"></h1>

    <!-- Notification -->
    <div id="notification" class="notification" style="display: none;">
        <span id="notification-text"></span>
    </div>

    <div class="toggle-switch">
        <input id="toggle-switch-input" type="checkbox"/>
        <label class="slider" for="toggle-switch-input"></label>
        <span id="status-text"></span>
    </div>

    <p><span id="captured-label"></span> <strong id="request-count">0</strong></p>

    <div class="actions">
        <button disabled id="save-har-button"></button>
        <button disabled id="clear-data-button"></button>
    </div>
</div>
<script src="./main.ts" type="module"></script>
</body>
</html>
