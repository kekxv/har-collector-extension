<!-- src/fallback/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HAR Collector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 32px 20px;
        }
        .card {
            background: #fff; border-radius: 16px; padding: 32px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-width: 780px; width: 100%; margin: 0 auto;
        }

        /* --- Header --- */
        .header { text-align: center; margin-bottom: 28px; }
        .header h1 {
            font-size: 26px; font-weight: 800; color: #4A90E2;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .header h1 .icon {
            width: 36px; height: 36px; border-radius: 10px;
            background: linear-gradient(135deg, #4A90E2, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff;
        }
        .header .tagline { font-size: 13px; color: #aaa; margin-top: 4px; }

        /* --- Summary --- */
        .summary {
            text-align: center; padding: 18px 20px;
            background: linear-gradient(135deg, #f0f7ff, #f5f0ff);
            border-radius: 12px; margin-bottom: 20px; font-size: 15px; color: #555;
        }
        .summary strong {
            font-size: 32px; color: #4A90E2; font-weight: 800;
            margin: 0 4px;
        }
        .summary .unit { font-size: 14px; color: #999; font-weight: 400; }

        /* --- Request List --- */
        .list-header-bar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: #f8fafc;
            border: 1px solid #e8ecf1; border-bottom: none;
            border-radius: 12px 12px 0 0;
        }
        .list-header-bar .title { font-size: 14px; font-weight: 600; color: #333; }
        .list-header-bar .count { font-size: 12px; color: #999; }
        .request-list-container {
            border: 1px solid #e8ecf1; border-radius: 0 0 12px 12px;
            overflow: hidden; margin-bottom: 20px;
        }
        .request-list-header {
            display: flex; padding: 10px 16px; gap: 8px;
            background: #f8fafc; border-bottom: 1px solid #e8ecf1;
            font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .request-list-header .col-method { min-width: 68px; }
        .request-list-header .col-url { flex: 1; }
        .request-list-header .col-status { min-width: 50px; text-align: center; }
        #request-list { max-height: 320px; overflow-y: auto; }
        .request-item {
            display: flex; align-items: center;
            padding: 10px 16px; gap: 10px;
            font-size: 13px; border-bottom: 1px solid #f0f2f5;
            transition: background 0.15s;
        }
        .request-item:hover { background: #f5f8ff; }
        .request-item:last-child { border-bottom: none; }
        .request-method {
            font-weight: 700; font-family: 'SF Mono', 'Fira Code', monospace;
            min-width: 56px; padding: 3px 8px;
            border-radius: 5px; text-align: center; font-size: 11px;
            letter-spacing: 0.5px;
        }
        .method-get { background: #e8f5e9; color: #2e7d32; }
        .method-post { background: #e3f2fd; color: #1565c0; }
        .method-put { background: #fff3e0; color: #ef6c00; }
        .method-delete { background: #ffebee; color: #c62828; }
        .method-patch { background: #f3e5f5; color: #7b1fa2; }
        .method-other { background: #f5f5f5; color: #616161; }
        .request-url {
            flex: 1; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
            color: #333; font-size: 12px;
        }
        .request-status {
            font-weight: 700; min-width: 44px; text-align: center;
            font-size: 12px; font-family: 'SF Mono', 'Fira Code', monospace;
        }
        .status-2xx { color: #27ae60; }
        .status-3xx { color: #4A90E2; }
        .status-4xx { color: #f57c00; }
        .status-5xx { color: #e74c3c; }
        .status-other { color: #ccc; }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 40px 20px; color: #ccc;
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
        .empty-state .text { font-size: 14px; }

        /* --- Pagination --- */
        .pagination {
            display: flex; align-items: center; justify-content: center;
            gap: 4px; padding: 12px; border-top: 1px solid #e8ecf1;
        }
        .pagination button {
            padding: 6px 10px; border: 1px solid #dce1e8;
            border-radius: 6px; background: #fff; color: #555;
            font-size: 12px; font-weight: 500; cursor: pointer;
            min-width: 32px; transition: all 0.15s;
        }
        .pagination button:hover:not(:disabled) { border-color: #4A90E2; color: #4A90E2; background: #f5f8ff; }
        .pagination button:disabled { opacity: 0.35; cursor: not-allowed; }
        .pagination button.active { background: #4A90E2; color: #fff; border-color: #4A90E2; }
        .pagination .page-info { font-size: 12px; color: #999; margin: 0 6px; font-weight: 500; }

        /* --- Options --- */
        .options {
            display: flex; justify-content: center; gap: 24px;
            padding: 16px 0; margin-bottom: 12px;
            border-top: 1px solid #f0f2f5; border-bottom: 1px solid #f0f2f5;
        }
        .checkbox-option {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; cursor: pointer; color: #555;
        }
        .checkbox-option input {
            width: 16px; height: 16px; accent-color: #4A90E2; cursor: pointer;
        }

        /* --- Actions --- */
        .actions { display: flex; gap: 12px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
        .actions button {
            padding: 12px 28px; border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: linear-gradient(135deg, #4A90E2, #5BA0F0); color: #fff; }
        .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(74,144,226,0.4); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #f07060); color: #fff; }
        .btn-danger:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(231,76,60,0.4); }
        .btn-secondary { background: #f0f2f5; color: #555; }
        .btn-secondary:hover:not(:disabled) { background: #e8ecf1; }
        .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; }
        .btn-success:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(39,174,96,0.4); }
        .actions button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- Download Progress --- */
        .spinner {
            width: 44px; height: 44px; border: 4px solid #e8ecf1;
            border-top-color: #4A90E2; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .progress-bar {
            width: 100%; height: 8px; background: #e8ecf1; border-radius: 4px;
            margin: 20px 0 12px; overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4A90E2, #764ba2);
            border-radius: 4px; transition: width 0.3s ease; width: 0%;
        }
        .progress-text { font-size: 13px; color: #777; text-align: center; }
        .file-list { margin-top: 16px; }
        .file-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 16px; margin: 6px 0; border-radius: 8px;
            background: #f8fafc; font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
            border: 1px solid #e8ecf1; transition: background 0.15s;
        }
        .file-item .status {
            font-family: -apple-system, sans-serif; font-size: 12px;
            padding: 3px 12px; border-radius: 12px; font-weight: 500;
        }
        .status.pending { background: #e8ecf1; color: #888; }
        .status.preparing { background: #fff3cd; color: #856404; }
        .status.downloading { background: #cce5ff; color: #004085; }
        .status.done { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .error { color: #e74c3c; text-align: center; margin: 12px 0; }
        .success { color: #27ae60; text-align: center; margin: 12px 0; font-weight: 600; }
        .stats { font-size: 13px; color: #777; margin-top: 16px; text-align: center; padding: 14px; background: linear-gradient(135deg, #f8fafc, #f5f0ff); border-radius: 10px; font-weight: 500; }

        /* --- Sections --- */
        .section-download { display: none; }
        .section-download.active { display: block; }
        .section-manager { display: block; }
        .section-manager.hidden { display: none; }

        /* --- Scrollbar --- */
        #request-list::-webkit-scrollbar { width: 6px; }
        #request-list::-webkit-scrollbar-track { background: transparent; }
        #request-list::-webkit-scrollbar-thumb { background: #d0d5dd; border-radius: 3px; }
        #request-list::-webkit-scrollbar-thumb:hover { background: #b0b5bd; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1><span class="icon">📡</span> HarCollector</h1>
            <p class="tagline">Network Request Inspector &amp; HAR Exporter</p>
        </div>

        <!-- Manager Section -->
        <div class="section-manager" id="manager-section">
            <div class="summary">
                <span id="captured-label"></span> <strong id="request-count">0</strong> <span class="unit"></span>
            </div>

            <div class="list-header-bar">
                <span class="title">Captured Requests</span>
                <span class="count" id="list-count"></span>
            </div>
            <div class="request-list-container">
                <div class="request-list-header">
                    <span class="col-method">Method</span>
                    <span class="col-url">URL</span>
                    <span class="col-status">Status</span>
                </div>
                <div id="request-list"></div>
                <div class="pagination" id="pagination" style="display:none;"></div>
            </div>

            <div class="options">
                <label class="checkbox-option">
                    <input id="split-files-input" type="checkbox"/>
                    <span id="split-label"></span>
                </label>
            </div>

            <div class="actions">
                <button class="btn-primary" id="save-har-button"></button>
                <button class="btn-danger" id="clear-data-button"></button>
            </div>
        </div>

        <!-- Download Section -->
        <div class="section-download" id="download-section">
            <h2 id="title" style="text-align:center;font-size:20px;font-weight:700;color:#4A90E2;margin-bottom:6px;"></h2>
            <p class="progress-text" id="progress-subtitle" style="text-align:center;font-size:13px;color:#999;margin-bottom:16px;"></p>
            <div class="spinner" id="spinner"></div>
            <div class="progress-bar" id="progress-bar" style="display:none;">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p class="progress-text" id="progress-text"></p>
            <div class="file-list" id="file-list"></div>
            <p id="message"></p>
            <p class="stats" id="stats"></p>
            <div class="actions" style="margin-top:20px;">
                <button class="btn-secondary" id="back-to-list-btn" style="display:none;"></button>
                <button class="btn-success" id="close-page-btn" style="display:none;"></button>
            </div>
        </div>
    </div>
    <script src="main.ts" type="module"></script>
</body>
</html>
